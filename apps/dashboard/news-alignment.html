<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日新闻对齐</title>
    <link rel="stylesheet" href="/news-alignment.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>每日新闻对齐</h1>
          <p>用 10 条新闻和数字“我”校对判断，再沉淀 SelfCore 候选。</p>
        </div>
        <nav class="nav">
          <a href="/">关系页</a>
          <a href="/selfcore-candidates.html?pool=news_alignment">新闻候选池</a>
          <a href="/selfcore-candidates.html?pool=multimodal">多模态候选池</a>
          <a href="/multimodal.html">多模态摄入</a>
        </nav>
      </header>

      <section class="panel settings">
        <label>
          <span>Poe API Key</span>
          <input id="poeApiKey" type="password" autocomplete="off" placeholder="pkey-..." />
        </label>
        <label>
          <span>模型</span>
          <input id="poeModel" autocomplete="off" value="GPT-4o" />
        </label>
      </section>

      <section class="workspace">
        <section class="panel news-column">
          <div class="panel-head">
            <div>
              <h2>今日 10 条</h2>
              <p id="resultMeta">等待拉取</p>
            </div>
          </div>
          <textarea id="newsText" class="hidden-field" aria-hidden="true" tabindex="-1"></textarea>
          <div class="actions">
            <button type="button" class="ghost" id="clearButton">清空</button>
            <button type="button" class="ghost" id="fetchNewsButton">自动拉取 10 条</button>
            <button type="button" id="analyzeButton">生成初判</button>
          </div>
          <div id="newsList" class="news-list"></div>
        </section>

        <section class="panel detail-column">
          <div class="panel-head">
            <div>
              <h2>新闻详情</h2>
              <p>点击左侧标题切换。</p>
            </div>
          </div>
          <article id="newsDetail" class="news-detail empty">自动拉取后，详情会显示在这里。</article>

          <div class="section-head">
            <h2>数字“我”的初判</h2>
          </div>
          <pre id="analysisText">生成初判后，会随当前新闻切换。</pre>

          <label class="alignment-note">
            <span>我的校对</span>
            <textarea id="userAlignment" rows="5" placeholder="针对当前这条新闻校对：不关心、判断太确定、重点错了、我真实会怎么想。"></textarea>
          </label>
          <div class="alignment-actions">
            <button type="button" id="mergeCandidateButton">合并为候选</button>
          </div>
        </section>

        <section class="panel confirm-panel">
          <div class="panel-head">
            <div>
              <h2>SelfCore 候选</h2>
              <p id="confirmMeta">只写入你勾选确认的候选。</p>
            </div>
          </div>
          <div id="candidateList" class="candidate-list"></div>
          <button type="button" id="confirmButton">确认写入候选池</button>
        </section>
      </section>
    </main>
    <script src="/news-alignment.js"></script>
  </body>
</html>
